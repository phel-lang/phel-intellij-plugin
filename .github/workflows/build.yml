name: Build
on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
  
jobs:

  # Prepare the environment and build the plugin
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.properties.outputs.version }}
      changelog: ${{ steps.properties.outputs.changelog }}
    steps:

      # Free GitHub Actions Environment Disk Space
      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false

      # Check out the current repository
      - name: Fetch Sources
        uses: actions/checkout@v7

      # Set up the Java environment for the next steps
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      # Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      # Build plugin
      - name: Build plugin
        run: .github/scripts/gradle-retry.sh buildPlugin

      # Expose the plugin version and the changelog notes for the release-draft job below.
      - name: Export version and changelog
        id: properties
        shell: bash
        run: |
          VERSION="$(grep -E '^version = ' build.gradle.kts | head -1 | cut -d'"' -f2)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # The current version's changelog section, falling back to Unreleased when it is not
          # promoted yet (matches patchPluginXml's changeNotes logic in build.gradle.kts).
          CHANGELOG="$(./gradlew getChangelog --no-header --console=plain -q 2>/dev/null \
            || ./gradlew getChangelog --unreleased --no-header --console=plain -q 2>/dev/null || true)"
          {
            echo "changelog<<CHANGELOG_EOF"
            echo "$CHANGELOG"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      # Enforce the plugin project configuration check. verifyPluginProjectConfiguration only logs a
      # warning and exits 0 (it reports to Gradle's Problems API at WARNING severity), so on its own
      # it can never fail CI — the whole point of this issue. Capture its output and fail when any
      # unmuted issue is reported. Deliberate policy items (since-build, until-build) are muted in
      # build.gradle.kts, so this trips only on new or real configuration problems.
      - name: Enforce plugin project configuration
        shell: bash
        run: |
          set -uo pipefail
          output="$(.github/scripts/gradle-retry.sh verifyPluginProjectConfiguration 2>&1)"
          status=$?
          echo "$output"
          if [ "$status" -ne 0 ]; then
            echo "::error::verifyPluginProjectConfiguration task failed."
            exit "$status"
          fi
          if grep -q "plugin configuration issues were found" <<<"$output"; then
            echo "::error::verifyPluginProjectConfiguration reported configuration issues. Fix them, or if an item reflects deliberate policy, mute its exact message via mutedMessages in build.gradle.kts."
            exit 1
          fi
          echo "Plugin project configuration is clean."

      # Prepare plugin archive content for creating artifact
      - name: Prepare Plugin Artifact
        id: artifact
        shell: bash
        run: |
          cd ${{ github.workspace }}/build/distributions
          FILENAME=`ls *.zip`
          unzip "$FILENAME" -d content

          echo "filename=${FILENAME:0:-4}" >> $GITHUB_OUTPUT

      # Store an already-built plugin as an artifact for downloading
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact.outputs.filename }}
          path: ./build/distributions/content/*/*

  # Run tests and upload a code coverage report
  test:
    name: Test
    needs: [ build ]
    runs-on: ubuntu-latest
    steps:

      # Free GitHub Actions Environment Disk Space
      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false

      # Check out the current repository
      - name: Fetch Sources
        uses: actions/checkout@v7

      # Set up the Java environment for the next steps
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      # Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      # Run tests and generate the Kover coverage report. Both depend on `test`, so it runs once
      # under Kover instrumentation and koverXmlReport writes build/reports/kover/report.xml for the
      # upload step below.
      - name: Run Tests
        run: .github/scripts/gradle-retry.sh check koverXmlReport

      # Collect Tests Result of failed tests
      - name: Collect Tests Result
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: tests-result
          path: ${{ github.workspace }}/build/reports/tests

      # Upload the Kover report to CodeCov
      - name: Upload Code Coverage Report
        uses: codecov/codecov-action@v7
        with:
          files: ${{ github.workspace }}/build/reports/kover/report.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  # Run plugin structure verification along with IntelliJ Plugin Verifier
  verify:
    name: Verify plugin
    needs: [ build ]
    runs-on: ubuntu-latest
    steps:

      # Free GitHub Actions Environment Disk Space
      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false

      # Check out the current repository
      - name: Fetch Sources
        uses: actions/checkout@v7

      # Set up the Java environment for the next steps
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      # Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      # Run Verify Plugin task and IntelliJ Plugin Verifier tool
      - name: Run Plugin Verification tasks
        run: .github/scripts/gradle-retry.sh verifyPlugin

      # Collect Plugin Verifier Result
      - name: Collect Plugin Verifier Result
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: pluginVerifier-result
          path: ${{ github.workspace }}/build/reports/pluginVerifier

  # Refresh a DRAFT GitHub Release for the current version on every green push to main. A draft
  # publishes nothing; the actual Marketplace publish happens only when a human publishes the
  # release, which triggers release.yml.
  releaseDraft:
    name: Release draft
    if: github.event_name != 'pull_request'
    needs: [ build, test, verify ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Fetch Sources
        uses: actions/checkout@v7

      # Keep a single draft: drop any previous drafts before recreating the current one.
      # Delete by release ID, never by tag name. A draft may carry the same tagName as an already
      # published release (GitHub allows it, since a draft is not bound to a tag until published),
      # and `gh release delete <tag>` then resolves to — and destroys — the published release.
      - name: Remove old draft releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/$GITHUB_REPOSITORY/releases" --paginate \
            --jq '.[] | select(.draft) | .id' \
            | while read -r id; do
                [ -n "$id" ] || continue
                gh api -X DELETE "repos/$GITHUB_REPOSITORY/releases/$id" \
                  && echo "Deleted draft release id=$id"
              done

      - name: Create release draft
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.build.outputs.version }}
          CHANGELOG: ${{ needs.build.outputs.changelog }}
        run: |
          # Old drafts were already removed, so if a release for this version still exists it is a
          # published one — the version has not been bumped since it shipped. Nothing to draft.
          if gh release view "v$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release v$VERSION is already published; nothing to draft until the next version bump."
            exit 0
          fi
          gh release create "v$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --draft \
            --title "v$VERSION" \
            --notes "${CHANGELOG:-_No changelog entries for this version._}"
